name: Build And Push Base Images To ECR

on:
  schedule:
    # Weekly patch cycle — every Monday 06:00 UTC
    - cron: "0 6 * * 1"

  push:
    branches:
      - main 
    paths:
      - 'images/**'
      - '.github/workflows/images.yml'

  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

env:
  AWS_DEFAULT_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
  
jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — VERSION
  # Calculate the next SemVer2 from Git tags
  # ─────────────────────────────────────────────
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for tag inspection

      - name: Calculate SemVer2
        id: semver
        run: |
          # Get latest tag or default to v0.0.0
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.0.0")
          echo "Latest tag: $LATEST"

          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)

          BUMP="${{ github.event.inputs.version_bump }}"
          BUMP="${BUMP:-patch}"   # default to patch for schedule/push triggers

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$VERSION"     >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # JOB 2 — BUILD (matrix: python | node | java)
  # Lint → Scan → Build → Push → Sign
  # ─────────────────────────────────────────────
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: version
    permissions:
      id-token: write      # OIDC → AWS
      contents: read
      security-events: write  # Upload SARIF to GitHub Security tab

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: python
            context: images/python
            ecr_repo: python-base
            runtime_tag: "3.12"
          - image: node
            context: images/nodejs
            ecr_repo: node-base
            runtime_tag: "22-lts"
          - image: java   
            context: images/java
            ecr_repo: java-base
            runtime_tag: "21-jre"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Lint ──────────────────────────────────
      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.context }}/Dockerfile
          failure-threshold: warning

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Build (3 tags) ────────────────────────
      - name: Build Docker image
        id: build
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          RUNTIME="${{ matrix.runtime_tag }}"
          REPO="${{ env.ECR_REGISTRY }}/${{ matrix.ecr_repo }}"

          aws ecr get-login-password \
            --region $(AWS_DEFAULT_REGION) | helm registry login \
            --username AWS \
            --password-stdin $(AWS_ACCOUNT_ID).dkr.ecr.$(AWS_DEFAULT_REGION).amazonaws.com
          docker build \
            --build-arg VERSION="$VERSION" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t "$REPO:$VERSION" \
            -t "$REPO:$RUNTIME" \
            -t "$REPO:latest" \
            ${{ matrix.context }}

          # Capture digest for signing
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$REPO:$VERSION" 2>/dev/null || \
                   docker images --no-trunc --format '{{.ID}}' "$REPO:$VERSION")
          echo "image_uri=$REPO:$VERSION" >> $GITHUB_OUTPUT
          echo "digest=$DIGEST"           >> $GITHUB_OUTPUT
          
      # ── CIS Benchmark (Dockle) ────────────────
      - name: CIS Docker Benchmark (Dockle)
        run: |
          # Install Dockle
          VERSION=$(curl -s https://api.github.com/repos/goodwithtech/dockle/releases/latest | \
                    grep '"tag_name"' | cut -d '"' -f4 | tr -d 'v')
          curl -Lo dockle.tar.gz \
            "https://github.com/goodwithtech/dockle/releases/download/v${VERSION}/dockle_${VERSION}_Linux-64bit.tar.gz"
          tar -xzf dockle.tar.gz && sudo mv dockle /usr/local/bin/

          dockle \
            --exit-code 1 \
            --exit-level warn \
            "${{ env.ECR_REGISTRY }}/${{ matrix.ecr_repo }}:${{ needs.version.outputs.version }}"


      # ── Push all 3 tags ───────────────────────
      - name: Push to ECR
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          RUNTIME="${{ matrix.runtime_tag }}"
          REPO="${{ env.ECR_REGISTRY }}/${{ matrix.ecr_repo }}"

          docker push "$REPO:$VERSION"
          docker push "$REPO:$RUNTIME"
          docker push "$REPO:latest"
          
      # ── Cosign signing (AWS KMS) ──────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with AWS KMS
        env:
          COSIGN_KMS_KEY: ${{ secrets.COSIGN_KMS_KEY_ARN }}
        run: |
          REPO="${{ env.ECR_REGISTRY }}/${{ matrix.ecr_repo }}"
          VERSION="${{ needs.version.outputs.version }}"

          # Sign by digest (immutable reference)
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$REPO:$VERSION")
          cosign sign --key "awskms:///${{ secrets.COSIGN_KMS_KEY_ARN }}" \
            --yes \
            "$IMAGE_DIGEST"
